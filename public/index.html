<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMOSYS | Memory Management Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Lexend Deca', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { 
                        base: '#0f0f11',    /* Abu-abu sangat gelap, tidak hitam murni */
                        surface: '#18181b', /* Latar panel */
                        line: '#3f3f46',    /* Border abu-abu terang */
                        muted: '#a1a1aa',   /* Teks sekunder */
                        accent: '#f4f4f5'   /* Teks utama putih/abu terang */
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: theme('colors.base'); color: theme('colors.accent'); font-family: theme('fontFamily.sans'); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
        input, button { outline: none; transition: all 0.2s ease; }
        input:focus { border-color: #a1a1aa; }
        
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 44px; height: 44px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden antialiased">
    
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-base/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-sm font-mono text-muted uppercase tracking-wider">Memproses Data...</p>
    </div>

    <div id="modalOverlay" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
        <div class="bg-surface border border-line p-8 rounded-lg max-w-md w-full shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-2">Pemberitahuan Sistem</h3>
            <p id="modalMessage" class="text-muted text-sm mb-6 leading-relaxed">Pesan akan muncul di sini.</p>
            <button onclick="hideModal()" class="w-full bg-white hover:bg-gray-200 text-black font-semibold py-3 rounded text-sm transition-colors">Tutup</button>
        </div>
    </div>

    <header class="border-b border-line px-8 py-5 flex justify-between items-center shrink-0 bg-surface">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tight text-white leading-none">MEMOSYS</h1>
            <span class="text-sm font-mono text-muted uppercase border-l border-line pl-4 ml-1">Kelompok 6</span>
        </div>
        <div class="flex gap-12 font-mono text-sm">
            <div class="flex flex-col items-end">
                <span class="text-muted uppercase mb-1">Page Faults</span>
                <span id="stat-faults" class="text-red-400 font-bold text-2xl leading-none">0</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-muted uppercase mb-1">Available RAM</span>
                <span id="stat-ram" class="text-emerald-400 font-bold text-2xl leading-none">0 KB</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-[400px] border-r border-line p-8 flex flex-col gap-8 overflow-y-auto shrink-0 bg-surface">
            
            <section>
                <div class="text-sm font-bold text-white uppercase tracking-wide mb-5 pb-3 border-b border-line">Konfigurasi Memori</div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-muted mb-2 uppercase tracking-wide">Total RAM Fisik (KB)</label>
                        <input type="number" id="total_ram" value="128" class="w-full bg-base border border-line p-3 text-base text-white rounded">
                    </div>
                    <div>
                        <label class="block text-xs text-muted mb-2 uppercase tracking-wide">Ukuran Page/Block (KB)</label>
                        <input type="number" id="page_size" value="8" class="w-full bg-base border border-line p-3 text-base text-white rounded">
                    </div>
                    <button onclick="setupSystem()" class="w-full bg-white hover:bg-gray-200 text-black font-semibold py-3 text-sm rounded mt-2">Format System</button>
                </div>
            </section>
            
            <section>
                <div class="text-sm font-bold text-white uppercase tracking-wide mb-5 pb-3 border-b border-line">Manajemen Proses</div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-muted mb-2 uppercase tracking-wide">Nama Proses / Aplikasi</label>
                        <input type="text" id="process_name" placeholder="Contoh: BROWSER" class="w-full bg-base border border-line p-3 text-base text-white rounded uppercase">
                    </div>
                    <div>
                        <label class="block text-xs text-muted mb-2 uppercase tracking-wide">Memory Required (KB)</label>
                        <input type="number" id="process_size" placeholder="10" class="w-full bg-base border border-line p-3 text-base text-white font-mono rounded">
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <button onclick="allocateProcess()" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 text-sm rounded">Alokasi Memori</button>
                        <button onclick="deallocateProcess()" class="bg-base hover:bg-line text-red-400 border border-line font-semibold py-3 text-sm rounded">Kill Process</button>
                    </div>
                </div>
            </section>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 bg-base">
            <section class="flex-[3] flex flex-col border-b border-line">
                <div class="px-8 py-4 border-b border-line bg-surface">
                    <span class="text-sm font-bold text-white uppercase tracking-wide">Peta Memori Fisik (RAM)</span>
                </div>
                <div class="flex-1 overflow-y-auto p-8">
                    <div id="memoryMap" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                        </div>
                </div>
            </section>

            <section class="flex-[2] flex min-h-0">
                <div class="flex-[2] border-r border-line flex flex-col bg-surface">
                    <div class="px-8 py-4 border-b border-line"><span class="text-sm font-bold text-white uppercase tracking-wide">Tabel Translasi (Page Table)</span></div>
                    <div class="flex-1 overflow-y-auto">
                        <table class="w-full text-left text-sm font-mono">
                            <thead class="bg-base text-muted sticky top-0">
                                <tr>
                                    <th class="py-3 px-6 font-semibold border-b border-line">Process Name</th>
                                    <th class="py-3 px-6 font-semibold border-b border-line">Status</th>
                                    <th class="py-3 px-6 font-semibold border-b border-line text-right">Physical Frame</th>
                                </tr>
                            </thead>
                            <tbody id="pageTable"></tbody>
                        </table>
                    </div>
                </div>
                <div class="flex-[3] flex flex-col bg-surface">
                    <div class="px-8 py-4 border-b border-line"><span class="text-sm font-bold text-white uppercase tracking-wide">Terminal Output Log</span></div>
                    <div id="activityLog" class="flex-1 overflow-y-auto p-6 space-y-4 font-mono text-sm text-muted bg-base">
                        </div>
                </div>
            </section>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
